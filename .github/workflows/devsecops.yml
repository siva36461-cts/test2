name: DevSecOps - Python Lint & Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    name: Pylint Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pylint
          pip install -r requirements.txt

      - name: Run Pylint
        run: |
          pylint **/*.py --fail-under=7.0 \
            --disable=C0114,C0115,C0116 \
            --output-format=colorized
        continue-on-error: false

  security:
    name: Security Scan (Bandit + Safety)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit safety
          pip install -r requirements.txt

      - name: Run Bandit (SAST)
        run: |
          bandit -r . -ll -ii --exclude ./.git \
            --format json -o bandit-report.json || true
          bandit -r . -ll -ii --exclude ./.git

      - name: Run Safety (Dependency CVE check)
        run: |
          safety check -r requirements.txt --full-report

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
